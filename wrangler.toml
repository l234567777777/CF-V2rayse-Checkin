name = "dashboard"
main = "index.js"
compatibility_date = "2024-01-01"

# 环境变量（开发环境）
[vars]
# JC = "https://your-domain.com"
# ZH = "your-email@example.com"
# MM = "your-password"
# TYPE = "v2rayse"

# 密钥（生产环境通过 wrangler secret 设置）
# [[secrets]]
# TGTOKEN = "your-bot-token"
# TGID = "your-chat-id"

# 定时触发器
[[triggers]]
crons = ["0 6 * * *"]